spring.application.name=portfolio-manager-api
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/portfolio_manager}
spring.datasource.username=${DB_USERNAME:portfolio}
spring.datasource.password=${DB_PASSWORD:portfolio}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
springdoc.swagger-ui.path=/swagger-ui.html
app.external-members.base-url=${MEMBERS_API_URL:http://localhost:8080/api/external/members}
app.seed-data=${APP_SEED_DATA:false}
