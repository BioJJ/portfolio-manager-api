services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio_manager
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_manager"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/portfolio_manager
      DB_USERNAME: portfolio
      DB_PASSWORD: portfolio
      APP_SEED_DATA: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres-data:
